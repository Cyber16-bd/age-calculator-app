name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'zulu'

    - name: Initialize Node.js and Capacitor
      run: |
        npm init -y
        npm install @capacitor/core @capacitor/cli @capacitor/android
        npx cap init "Age Calculator" "com.shawnsapps.agecalculator" --web-dir=.
        npx cap add android

    - name: Sync Code to Android Project
      run: npx cap sync

    - name: Build App with Gradle
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Age-Calculator-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
